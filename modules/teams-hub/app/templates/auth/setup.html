<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initial Setup — Teams Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root, [data-theme="dark"] {
            --bg: #0F172A; --card-bg: #1E293B; --input-bg: #334155;
            --text: #F1F5F9; --text-sec: #94A3B8; --border: #334155;
            --accent: #3B82F6; --accent-hover: #2563EB; --danger: #EF4444;
        }
        [data-theme="light"] {
            --bg: #F1F5F9; --card-bg: #FFFFFF; --input-bg: #F1F5F9;
            --text: #0F172A; --text-sec: #475569; --border: #E2E8F0;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .setup-container { width: 100%; max-width: 480px; padding: 20px; }
        .setup-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px 32px;
        }
        .setup-header { text-align: center; margin-bottom: 32px; }
        .setup-header .icon { font-size: 2.5rem; color: var(--accent); margin-bottom: 12px; }
        .setup-header h1 { font-size: 1.4rem; font-weight: 700; }
        .setup-header p { color: var(--text-sec); font-size: 0.85rem; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; color: var(--text-sec); }
        .form-control {
            width: 100%; padding: 10px 12px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem;
        }
        .form-control:focus { outline: none; border-color: var(--accent); }
        .btn-setup {
            width: 100%; padding: 12px; background: var(--accent); color: #fff;
            border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; margin-top: 8px;
        }
        .btn-setup:hover { background: var(--accent-hover); }
        .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; }
        .flash-danger { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .flash-success { background: rgba(34,197,94,0.12); color: #22C55E; border: 1px solid rgba(34,197,94,0.3); }
        .section-title { font-size: 0.85rem; font-weight: 600; color: var(--text-sec); margin: 20px 0 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div class="setup-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="setup-card">
            <div class="setup-header">
                <div class="icon"><i class="fas fa-magic"></i></div>
                <h1>Welcome to Teams Hub</h1>
                <p>Create your admin account to get started</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="section-title">Application</div>
                <div class="form-group">
                    <label>Application Name</label>
                    <input type="text" name="app_name" class="form-control" value="{{ app_name }}" required>
                </div>

                <div class="section-title">Admin Account</div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" value="admin" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password (min 8 characters)</label>
                    <input type="password" name="password" class="form-control" minlength="8" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" class="form-control" minlength="8" required>
                </div>

                <button type="submit" class="btn-setup">
                    <i class="fas fa-rocket"></i> Complete Setup
                </button>
            </form>
        </div>
    </div>
</body>
</html>
