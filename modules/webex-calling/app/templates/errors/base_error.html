<!-- app/templates/errors/base_error.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>{% block title %}Error{% endblock %} — Orbit</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        crossorigin="anonymous"/>
  <style>
    body { background: #f0f4ff; display:flex; align-items:center;
           justify-content:center; min-height:100vh; }
    .error-card { max-width:480px; text-align:center;
                  padding:3rem; background:#fff;
                  border-radius:1rem;
                  box-shadow:0 10px 40px rgba(30,64,175,0.1); }
    .error-code { font-size:5rem; font-weight:900; line-height:1;
                  color:#1e40af; letter-spacing:-4px; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">{% block code %}{% endblock %}</div>
    <h4 class="mt-3 mb-2 fw-bold">{% block heading %}{% endblock %}</h4>
    <p class="text-muted mb-4">{% block message %}{% endblock %}</p>
    <a href="/" class="btn btn-primary px-4">
      <i class="bi bi-house me-2"></i>Back to Home
    </a>
  </div>
</body>
</html>
