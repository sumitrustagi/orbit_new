{% extends "admin/_base.html" %}
{% block title %}429 Too Many Requests{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <i class="fas fa-tachometer-alt" style="font-size: 48px; color: var(--warning); margin-bottom: 16px;"></i>
    <h2 style="margin-bottom: 8px;">429 — Too Many Requests</h2>
    <p style="color: var(--text-secondary);">You've made too many requests. Please wait a moment and try again.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary" style="margin-top: 20px;"><i class="fas fa-home"></i> Dashboard</a>
</div>
{% endblock %}
