{% extends "admin/_base.html" %}
{% block title %}400 Bad Request{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <i class="fas fa-exclamation-circle" style="font-size: 48px; color: var(--warning); margin-bottom: 16px;"></i>
    <h2 style="margin-bottom: 8px;">400 — Bad Request</h2>
    <p style="color: var(--text-secondary);">The server could not understand your request.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary" style="margin-top: 20px;"><i class="fas fa-home"></i> Dashboard</a>
</div>
{% endblock %}
