{% extends "admin/_base.html" %}
{% block title %}500 Internal Error{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--danger); margin-bottom: 16px;"></i>
    <h2 style="margin-bottom: 8px;">500 — Internal Server Error</h2>
    <p style="color: var(--text-secondary);">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary" style="margin-top: 20px;"><i class="fas fa-home"></i> Dashboard</a>
</div>
{% endblock %}
